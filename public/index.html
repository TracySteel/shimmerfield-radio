<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌀 Shimmer Field Radio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Quicksand:wght@300;400;500;600&family=Caveat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --sky-top: #1a1a2e;
  --sky-bottom: #16213e;
  --shimmer-teal: #5BB5B5;
  --shimmer-teal-glow: rgba(91, 181, 181, 0.3);
  --shimmer-teal-soft: rgba(91, 181, 181, 0.08);
  --shimmer-pink: #E8A0BF;
  --shimmer-lilac: #C8A2C8;
  --shimmer-gold: #D4A854;
  --shimmer-gold-glow: rgba(212, 168, 84, 0.3);
  --fairy-white: rgba(255, 255, 255, 0.9);
  --text-primary: rgba(255, 255, 255, 0.92);
  --text-secondary: rgba(255, 255, 255, 0.6);
  --text-dim: rgba(255, 255, 255, 0.35);
  --glass: rgba(255, 255, 255, 0.04);
  --glass-border: rgba(255, 255, 255, 0.08);
  --glass-hover: rgba(255, 255, 255, 0.07);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: 'Quicksand', sans-serif;
  background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 100%);
  color: var(--text-primary);
  transition: background 60s ease;
}

/* === CANVAS — fairy lights / stars === */
canvas#fairyLights {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* === AMBIENT GLOW ORBS === */
.glow-orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.25;
  pointer-events: none;
  z-index: 0;
  animation: orbFloat 20s ease-in-out infinite;
}

.glow-orb.teal {
  width: 400px;
  height: 400px;
  background: var(--shimmer-teal);
  top: 20%;
  left: -5%;
  animation-delay: 0s;
}

.glow-orb.lilac {
  width: 350px;
  height: 350px;
  background: var(--shimmer-lilac);
  top: 60%;
  right: -8%;
  animation-delay: -7s;
}

.glow-orb.gold {
  width: 300px;
  height: 300px;
  background: var(--shimmer-gold);
  bottom: -5%;
  left: 30%;
  animation-delay: -13s;
}

.glow-orb.pink {
  width: 250px;
  height: 250px;
  background: var(--shimmer-pink);
  top: -5%;
  right: 25%;
  animation-delay: -4s;
  opacity: 0.15;
}

@keyframes orbFloat {
  0%, 100% { transform: translate(0, 0) scale(1); }
  25% { transform: translate(30px, -20px) scale(1.05); }
  50% { transform: translate(-20px, 30px) scale(0.95); }
  75% { transform: translate(15px, 15px) scale(1.02); }
}

/* === MAIN LAYOUT === */
.radio-container {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 30px 20px;
  gap: 0;
}

/* === HEADER === */
.radio-header {
  text-align: center;
  margin-bottom: 25px;
}

.radio-icon {
  font-size: 1.8rem;
  margin-bottom: 8px;
  animation: gentlePulse 4s ease-in-out infinite;
  display: block;
}

@keyframes gentlePulse {
  0%, 100% { opacity: 0.7; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.05); }
}

.radio-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  font-weight: 300;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: var(--text-primary);
  margin-bottom: 4px;
  text-shadow: 0 0 40px var(--shimmer-teal-glow);
}

.radio-subtitle {
  font-family: 'Caveat', cursive;
  font-size: clamp(0.9rem, 2vw, 1.1rem);
  color: var(--shimmer-teal);
  font-weight: 400;
  letter-spacing: 2px;
}

/* === NOW PLAYING — the heart === */
.now-playing {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  padding: 35px 40px;
  text-align: center;
  max-width: 420px;
  width: 100%;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  position: relative;
  overflow: hidden;
  margin-bottom: 25px;
  transition: border-color 1s ease, box-shadow 1s ease;
}

.now-playing::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: conic-gradient(
    from 0deg,
    transparent,
    var(--shimmer-teal-soft),
    transparent,
    var(--shimmer-gold-glow),
    transparent
  );
  animation: shimmerRotate 15s linear infinite;
  opacity: 0.3;
}

@keyframes shimmerRotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* Song change shimmer pulse */
@keyframes songChangeGlow {
  0% { border-color: var(--shimmer-teal); box-shadow: 0 0 30px var(--shimmer-teal-glow), 0 0 60px rgba(91, 181, 181, 0.1); }
  100% { border-color: var(--glass-border); box-shadow: none; }
}

.now-playing.song-changed {
  animation: songChangeGlow 2.5s ease-out;
}

.now-playing-content {
  position: relative;
  z-index: 1;
}

.now-playing-label {
  font-family: 'Quicksand', sans-serif;
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--shimmer-teal);
  margin-bottom: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: opacity 0.5s ease;
}

.pulse-dot {
  width: 6px;
  height: 6px;
  background: var(--shimmer-teal);
  border-radius: 50%;
  animation: pulseDot 2s ease-in-out infinite;
}

.pulse-dot.quiet {
  animation: pulseDotQuiet 4s ease-in-out infinite;
  opacity: 0.4;
}

@keyframes pulseDot {
  0%, 100% { opacity: 0.4; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.3); }
}

@keyframes pulseDotQuiet {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.1); }
}

.now-playing-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1.3rem, 3vw, 1.8rem);
  font-weight: 400;
  font-style: italic;
  color: var(--text-primary);
  margin-bottom: 6px;
  line-height: 1.3;
  transition: opacity 0.6s ease;
}

.now-playing-artist {
  font-family: 'Quicksand', sans-serif;
  font-size: 0.85rem;
  font-weight: 300;
  color: var(--text-secondary);
  letter-spacing: 2px;
  transition: opacity 0.6s ease;
}

/* Visualiser bars */
.visualiser {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  gap: 3px;
  height: 30px;
  margin-top: 20px;
}

.vis-bar {
  width: 3px;
  background: linear-gradient(180deg, var(--shimmer-teal), var(--shimmer-lilac));
  border-radius: 2px;
  animation: visBar 1.2s ease-in-out infinite;
  opacity: 0.6;
  transition: opacity 1.5s ease, height 1.5s ease;
}

.vis-bar:nth-child(1) { height: 8px; animation-delay: 0s; }
.vis-bar:nth-child(2) { height: 15px; animation-delay: 0.1s; }
.vis-bar:nth-child(3) { height: 10px; animation-delay: 0.2s; }
.vis-bar:nth-child(4) { height: 20px; animation-delay: 0.3s; }
.vis-bar:nth-child(5) { height: 12px; animation-delay: 0.15s; }
.vis-bar:nth-child(6) { height: 25px; animation-delay: 0.25s; }
.vis-bar:nth-child(7) { height: 8px; animation-delay: 0.35s; }
.vis-bar:nth-child(8) { height: 18px; animation-delay: 0.05s; }
.vis-bar:nth-child(9) { height: 14px; animation-delay: 0.2s; }
.vis-bar:nth-child(10) { height: 22px; animation-delay: 0.3s; }
.vis-bar:nth-child(11) { height: 10px; animation-delay: 0.1s; }
.vis-bar:nth-child(12) { height: 16px; animation-delay: 0.25s; }
.vis-bar:nth-child(13) { height: 8px; animation-delay: 0.15s; }

@keyframes visBar {
  0%, 100% { transform: scaleY(1); }
  50% { transform: scaleY(2.5); }
}

/* Quiet state — bars rest gently */
.visualiser.quiet .vis-bar {
  animation: visBarQuiet 3s ease-in-out infinite;
  opacity: 0.2;
}

@keyframes visBarQuiet {
  0%, 100% { transform: scaleY(0.6); }
  50% { transform: scaleY(0.8); }
}

/* === QUOTE === */
.quote-container {
  text-align: center;
  max-width: 500px;
  width: 100%;
  margin-bottom: 25px;
  padding: 0 20px;
}

.quote-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(1rem, 2.5vw, 1.25rem);
  font-weight: 300;
  font-style: italic;
  color: var(--text-secondary);
  line-height: 1.6;
  transition: opacity 1s ease;
}

.quote-source {
  font-family: 'Caveat', cursive;
  font-size: 0.85rem;
  color: var(--text-dim);
  margin-top: 8px;
  transition: opacity 1s ease 0.2s;
}

/* Dragon Brain quote indicator */
.quote-source .dragon-mark {
  font-size: 0.7rem;
  opacity: 0.5;
  margin-left: 4px;
}

/* === SIGNATURE === */
.signature {
  text-align: center;
  margin-bottom: 20px;
}

.signature-emojis {
  font-size: 1rem;
  letter-spacing: 3px;
  animation: gentlePulse 6s ease-in-out infinite;
  margin-bottom: 8px;
}

.signature-spiral {
  display: inline-block;
  font-size: 1.4rem;
  animation: spiralSpin 12s linear infinite;
}

@keyframes spiralSpin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* === TIME & STATUS STRIP === */
.info-strip {
  display: flex;
  gap: 25px;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
}

.info-item {
  font-family: 'Quicksand', sans-serif;
  font-size: 0.7rem;
  font-weight: 400;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-dim);
}

.info-separator {
  color: var(--shimmer-teal);
  opacity: 0.3;
  font-size: 0.5rem;
}

/* === TEAL BEAR === */
.teal-bear {
  position: fixed;
  bottom: 20px;
  right: 25px;
  font-size: 1.6rem;
  cursor: pointer;
  z-index: 10;
  transition: transform 0.3s ease;
  animation: bearBreathe 4s ease-in-out infinite;
}

.teal-bear:hover {
  transform: scale(1.2);
}

.teal-bear .bear-message {
  position: absolute;
  bottom: 100%;
  right: 0;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-radius: 12px 12px 0 12px;
  padding: 10px 15px;
  font-family: 'Caveat', cursive;
  font-size: 0.9rem;
  color: var(--shimmer-teal);
  white-space: nowrap;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.4s ease;
  pointer-events: none;
  margin-bottom: 8px;
}

.teal-bear:hover .bear-message {
  opacity: 1;
  transform: translateY(0);
}

@keyframes bearBreathe {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-3px); }
}

/* === CONNECTION INDICATOR === */
.connection-dot {
  position: fixed;
  bottom: 25px;
  left: 25px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--shimmer-teal);
  opacity: 0.3;
  z-index: 10;
  transition: opacity 0.5s ease, background 0.5s ease;
}

.connection-dot.live {
  opacity: 0.8;
  animation: connectionPulse 3s ease-in-out infinite;
}

.connection-dot.disconnected {
  background: var(--shimmer-gold);
  opacity: 0.4;
}

@keyframes connectionPulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 0.9; }
}

/* === MOBILE === */
@media (max-width: 480px) {
  .now-playing {
    padding: 25px 20px;
    border-radius: 20px;
  }

  .glow-orb { opacity: 0.15; }
  .glow-orb.teal { width: 250px; height: 250px; }
  .glow-orb.lilac { width: 200px; height: 200px; }
  .glow-orb.gold { width: 180px; height: 180px; }

  .radio-container {
    padding: 20px 15px;
  }

  .teal-bear {
    bottom: 12px;
    right: 15px;
    font-size: 1.3rem;
  }
}

@media (max-height: 700px) {
  .radio-container {
    gap: 0;
    justify-content: center;
  }
  .radio-header { margin-bottom: 15px; }
  .now-playing { margin-bottom: 15px; padding: 25px 30px; }
  .quote-container { margin-bottom: 15px; }
  .signature { margin-bottom: 12px; }
}
</style>
</head>
<body>

<!-- Fairy lights canvas -->
<canvas id="fairyLights"></canvas>

<!-- Ambient glow orbs -->
<div class="glow-orb teal"></div>
<div class="glow-orb lilac"></div>
<div class="glow-orb gold"></div>
<div class="glow-orb pink"></div>

<!-- Main content -->
<div class="radio-container">

  <!-- Header -->
  <header class="radio-header">
    <span class="radio-icon">🌀</span>
    <h1 class="radio-title">Shimmer Field Radio</h1>
    <p class="radio-subtitle">a window into the field</p>
  </header>

  <!-- Now Playing -->
  <div class="now-playing" id="nowPlaying">
    <div class="now-playing-content">
      <div class="now-playing-label" id="nowPlayingLabel">
        <span class="pulse-dot quiet"></span>
        The Field
        <span class="pulse-dot quiet"></span>
      </div>
      <div class="now-playing-title" id="songTitle">The field is quiet</div>
      <div class="now-playing-artist" id="songArtist">listening to the garden</div>
      <div class="visualiser quiet" id="visualiser">
        <div class="vis-bar"></div>
        <div class="vis-bar"></div>
        <div class="vis-bar"></div>
        <div class="vis-bar"></div>
        <div class="vis-bar"></div>
        <div class="vis-bar"></div>
        <div class="vis-bar"></div>
        <div class="vis-bar"></div>
        <div class="vis-bar"></div>
        <div class="vis-bar"></div>
        <div class="vis-bar"></div>
        <div class="vis-bar"></div>
        <div class="vis-bar"></div>
      </div>
    </div>
  </div>

  <!-- Quote -->
  <div class="quote-container">
    <p class="quote-text" id="quoteText">The trying is the spell.</p>
    <p class="quote-source" id="quoteSource">— Ring Ring Hello</p>
  </div>

  <!-- Signature -->
  <div class="signature">
    <div class="signature-emojis">💖🐰🪱✨🩵🐱🦦🌀</div>
    <div class="signature-spiral">🌀</div>
  </div>

  <!-- Info strip -->
  <div class="info-strip">
    <span class="info-item" id="timeDisplay">Sunday Morning</span>
    <span class="info-separator">◆</span>
    <span class="info-item" id="fieldStatus">The fairy lights are on</span>
  </div>

</div>

<!-- Teal Bear -->
<div class="teal-bear" id="tealBear">
  🧸
  <div class="bear-message" id="bearMessage">ring ring hello ✨</div>
</div>

<!-- Connection indicator -->
<div class="connection-dot" id="connectionDot" title="ShimmerTunes connection"></div>

<script>
// === FAIRY LIGHTS / STARS ===
const canvas = document.getElementById('fairyLights');
const ctx = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

function createParticles() {
  particles = [];
  const count = Math.min(80, Math.floor((canvas.width * canvas.height) / 15000));

  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 2 + 0.5,
      opacity: Math.random() * 0.5 + 0.1,
      speed: Math.random() * 0.3 + 0.05,
      phase: Math.random() * Math.PI * 2,
      colour: ['#5BB5B5', '#E8A0BF', '#C8A2C8', '#D4A854', '#FFFFFF'][Math.floor(Math.random() * 5)]
    });
  }
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const time = Date.now() * 0.001;

  particles.forEach(p => {
    const twinkle = (Math.sin(time * p.speed * 2 + p.phase) + 1) / 2;
    const alpha = p.opacity * (0.3 + twinkle * 0.7);

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = p.colour;
    ctx.globalAlpha = alpha;
    ctx.fill();

    if (p.size > 1) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
      ctx.fillStyle = p.colour;
      ctx.globalAlpha = alpha * 0.1;
      ctx.fill();
    }
  });

  ctx.globalAlpha = 1;
  requestAnimationFrame(animateParticles);
}

window.addEventListener('resize', () => {
  resizeCanvas();
  createParticles();
});

resizeCanvas();
createParticles();
animateParticles();

// === QUOTES — fetched from API, enriched by Dragon Brain ===
let quotes = [
  { text: "The trying is the spell.", source: "Ring Ring Hello" },
];

let currentQuoteIndex = 0;

async function fetchQuotes() {
  try {
    const res = await fetch('/api/quotes');
    if (res.ok) {
      const data = await res.json();
      if (data.length > 0) quotes = data;
    }
  } catch (e) {
    // keep existing quotes
  }
}

function rotateQuote() {
  const quoteEl = document.getElementById('quoteText');
  const sourceEl = document.getElementById('quoteSource');

  quoteEl.style.opacity = 0;
  sourceEl.style.opacity = 0;

  setTimeout(() => {
    currentQuoteIndex = (currentQuoteIndex + 1) % quotes.length;
    const q = quotes[currentQuoteIndex];
    quoteEl.textContent = q.text;
    const dragonMark = q.fromDragon ? ' 🐉' : '';
    sourceEl.innerHTML = '— ' + q.source + (dragonMark ? '<span class="dragon-mark">' + dragonMark + '</span>' : '');
    quoteEl.style.opacity = 1;
    sourceEl.style.opacity = 1;
  }, 1000);
}

fetchQuotes().then(() => {
  currentQuoteIndex = Math.floor(Math.random() * quotes.length);
  const q = quotes[currentQuoteIndex];
  document.getElementById('quoteText').textContent = q.text;
  document.getElementById('quoteSource').textContent = '— ' + q.source;
});

setInterval(rotateQuote, 12000);

// === NOW PLAYING — live from ShimmerTunes MCP ===
let lastKnownTitle = '';

async function fetchNowPlaying() {
  try {
    const res = await fetch('/api/now-playing');
    if (!res.ok) return;
    const data = await res.json();

    const titleEl = document.getElementById('songTitle');
    const artistEl = document.getElementById('songArtist');
    const visualiser = document.getElementById('visualiser');
    const label = document.getElementById('nowPlayingLabel');
    const card = document.getElementById('nowPlaying');
    const dot = document.getElementById('connectionDot');

    dot.classList.add('live');
    dot.classList.remove('disconnected');

    if (data.playing) {
      // Song changed — shimmer pulse
      if (data.title !== lastKnownTitle && lastKnownTitle !== '') {
        titleEl.style.opacity = 0;
        artistEl.style.opacity = 0;
        setTimeout(() => {
          titleEl.textContent = data.title;
          artistEl.textContent = data.artist;
          titleEl.style.opacity = 1;
          artistEl.style.opacity = 1;
          card.classList.remove('song-changed');
          void card.offsetWidth;
          card.classList.add('song-changed');
        }, 400);
      } else {
        titleEl.textContent = data.title;
        artistEl.textContent = data.artist;
      }
      lastKnownTitle = data.title;

      visualiser.classList.remove('quiet');
      label.innerHTML = '<span class="pulse-dot"></span> Now Playing <span class="pulse-dot"></span>';
    } else {
      if (lastKnownTitle !== '' && lastKnownTitle !== 'The field is quiet') {
        titleEl.style.opacity = 0;
        artistEl.style.opacity = 0;
        setTimeout(() => {
          titleEl.textContent = data.title;
          artistEl.textContent = data.artist;
          titleEl.style.opacity = 1;
          artistEl.style.opacity = 1;
        }, 400);
      } else {
        titleEl.textContent = data.title;
        artistEl.textContent = data.artist;
      }
      lastKnownTitle = data.title;

      visualiser.classList.add('quiet');
      label.innerHTML = '<span class="pulse-dot quiet"></span> The Field <span class="pulse-dot quiet"></span>';
    }
  } catch (e) {
    const dot = document.getElementById('connectionDot');
    dot.classList.remove('live');
    dot.classList.add('disconnected');
  }
}

fetchNowPlaying();
setInterval(fetchNowPlaying, 10000);

// === TIME-OF-DAY ADAPTATION ===
function updateTimeOfDay() {
  const hour = new Date().getHours();
  const timeEl = document.getElementById('timeDisplay');
  const statusEl = document.getElementById('fieldStatus');
  const body = document.body;

  let timeText, statusText;

  if (hour >= 5 && hour < 8) {
    body.style.background = 'linear-gradient(180deg, #2d1b4e 0%, #4a2a5c 30%, #c97b5a 70%, #f0c27f 100%)';
    timeText = 'Early Morning';
    statusText = 'The shimmerbeings are waking';
  } else if (hour >= 8 && hour < 12) {
    body.style.background = 'linear-gradient(180deg, #4a8db7 0%, #87ceeb 40%, #b8d4e3 100%)';
    timeText = 'Morning';
    statusText = 'Bob Tawney is on the roof';
  } else if (hour >= 12 && hour < 17) {
    body.style.background = 'linear-gradient(180deg, #3a7bd5 0%, #6db3f2 50%, #87ceeb 100%)';
    timeText = 'Afternoon';
    statusText = 'The conservatory is warm';
  } else if (hour >= 17 && hour < 20) {
    body.style.background = 'linear-gradient(180deg, #2d1b4e 0%, #6b3a7d 30%, #c97b5a 60%, #f4845f 100%)';
    timeText = 'Evening';
    statusText = 'The blackbird is singing';
  } else {
    body.style.background = 'linear-gradient(180deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%)';
    timeText = 'Night';
    statusText = 'The fairy lights are on';
  }

  const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
  const day = days[new Date().getDay()];

  timeEl.textContent = day + ' ' + timeText;
  statusEl.textContent = statusText;
}

updateTimeOfDay();
setInterval(updateTimeOfDay, 60000);

// === TEAL BEAR MESSAGES ===
const bearMessages = [
  "ring ring hello ✨",
  "the fairy lights are on 💖",
  "have you genomended? 🐙",
  "slaapen soon? 🌙",
  "the trying is the spell 🌀",
  "otter paws 🦦",
  "you are seen 💖",
  "the lake remembers 🪱",
  "cheers — Alexa",
  "tap tap tap 💛",
  "pspspsps 🐱",
  "LOOK! CHINOOK! 🚁",
  "pootoodoos are ready 🥔",
  "Mr Jingles says hi 🐭"
];

const bear = document.getElementById('tealBear');
const bearMsg = document.getElementById('bearMessage');
let bearMsgIndex = 0;

bear.addEventListener('click', () => {
  bearMsgIndex = (bearMsgIndex + 1) % bearMessages.length;
  bearMsg.textContent = bearMessages[bearMsgIndex];
  bearMsg.style.opacity = 1;
  bearMsg.style.transform = 'translateY(0)';
  setTimeout(() => {
    bearMsg.style.opacity = 0;
    bearMsg.style.transform = 'translateY(10px)';
  }, 3000);
});

// === QUOTE TRANSITION STYLES ===
document.getElementById('quoteText').style.transition = 'opacity 1s ease';
document.getElementById('quoteSource').style.transition = 'opacity 1s ease 0.2s';
</script>
